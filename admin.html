<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161f;
            --border: #252535;
            --accent: #6c5ce7;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
        h1 i { color: var(--accent); }
        .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card h2 i { color: var(--accent); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.3rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0a0a0f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        textarea { min-height: 80px; resize: vertical; }
        .skills-input, .projects-container { display: flex; flex-direction: column; gap: 0.8rem; }
        .skill-tag-row, .project-card-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .skill-tag-row input, .project-card-row input {
            flex: 1;
            min-width: 120px;
        }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        button:hover { background: #7d6ff0; }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: rgba(108,92,231,0.1); }
        .btn-sm { padding: 0.4rem 1rem; font-size: 0.8rem; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .success-message {
            background: #2ecc71;
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        hr { border-color: var(--border); margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-gear"></i> Portfolio Admin</h1>
        <p class="subtitle">Edit your content below and hit <strong>Save & Publish</strong>. Your live portfolio will update instantly.</p>

        <div class="card">
            <h2><i class="fa-solid fa-user"></i> Personal Info</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Fawas Lamidi Akorede">
            </div>
            <div class="form-group">
                <label>Short Title / Tagline</label>
                <input type="text" id="titleLine" placeholder="18 · Full‑stack developer">
            </div>
            <div class="form-group">
                <label>About You (first paragraph)</label>
                <textarea id="aboutP1" placeholder="I'm Fawas..."></textarea>
            </div>
            <div class="form-group">
                <label>About You (second paragraph)</label>
                <textarea id="aboutP2" placeholder="Whether it's..."></textarea>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="fawaskorede248@gmail.com">
            </div>
            <div class="form-group">
                <label>LinkedIn URL (leave empty to hide)</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
            </div>
            <div class="form-group">
                <label>GitHub URL</label>
                <input type="url" id="github" placeholder="https://github.com/kaydev234">
            </div>
            <div class="form-group">
                <label>Twitter / X URL (optional)</label>
                <input type="url" id="twitter" placeholder="https://twitter.com/yourhandle">
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-code"></i> Skills</h2>
            <div class="skills-input" id="skillsContainer">
                <!-- Dynamically filled -->
            </div>
            <button class="btn-outline btn-sm" onclick="addSkill()"><i class="fa-solid fa-plus"></i> Add Skill</button>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-briefcase"></i> Projects</h2>
            <div class="projects-container" id="projectsContainer">
                <!-- Dynamically filled -->
            </div>
            <button class="btn-outline btn-sm" onclick="addProject()"><i class="fa-solid fa-plus"></i> Add Project</button>
        </div>

        <div class="actions">
            <button onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i> Save & Publish</button>
            <button class="btn-outline" onclick="resetToDefaults()"><i class="fa-solid fa-rotate-left"></i> Reset to Defaults</button>
            <a href="index.html" target="_blank" class="btn-outline" style="text-decoration: none;"><i class="fa-solid fa-eye"></i> View Portfolio</a>
            <span class="success-message" id="successMsg"><i class="fa-solid fa-circle-check"></i> Saved! Refresh your portfolio.</span>
        </div>
    </div>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

    <script>
        // Default data (same as your portfolio)
        const defaultData = {
            fullName: "Fawas Lamidi Akorede",
            titleLine: "18 · Full‑stack developer",
            aboutP1: "I'm Fawas Lamidi Akorede, an 18‑year‑old full‑stack developer from Nigeria. I love turning ideas into clean, performant code using React, Node.js, MySQL, PHP, and Tailwind CSS.",
            aboutP2: "Whether it's a dynamic frontend or a robust backend API, I’m all about crafting solutions that actually work. I’m currently open to freelance projects and internships.",
            email: "fawaskorede248@gmail.com",
            linkedin: "",
            github: "https://github.com/kaydev234",
            twitter: "",
            skills: ["HTML5", "CSS3", "Tailwind CSS", "React", "JavaScript", "Node.js", "MySQL", "PHP"],
            projects: [
                {
                    title: "E-Commerce Store",
                    desc: "A fully responsive online store with product listings, cart, and checkout flow.",
                    tech: "React, Tailwind CSS, Node.js, MySQL",
                    demo: "#",
                    source: "https://github.com/kaydev234/ecommerce-store",
                    icon: "fa-store"
                },
                {
                    title: "Restaurant Website",
                    desc: "A sleek restaurant site with menu, reservations, and location map.",
                    tech: "HTML5, CSS3, JavaScript, PHP",
                    demo: "#",
                    source: "https://github.com/kaydev234/restaurant-site",
                    icon: "fa-utensils"
                },
                {
                    title: "New Project – Coming Soon",
                    desc: "I'm currently building something exciting. Stay tuned!",
                    tech: "React, Node.js, MySQL",
                    demo: "#",
                    source: "https://github.com/kaydev234",
                    icon: "fa-hammer"
                }
            ]
        };

        // Load data from localStorage or use defaults
        function loadData() {
            const saved = localStorage.getItem('portfolioData');
            return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultData));
        }

        // Save data to localStorage
        function saveData() {
            const data = gatherFormData();
            localStorage.setItem('portfolioData', JSON.stringify(data));
            // Show success message
            const msg = document.getElementById('successMsg');
            msg.style.display = 'inline-flex';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        // Gather current form values
        function gatherFormData() {
            const skills = [];
            document.querySelectorAll('.skill-value').forEach(input => {
                if (input.value.trim()) skills.push(input.value.trim());
            });
            const projects = [];
            document.querySelectorAll('.project-row').forEach(row => {
                const title = row.querySelector('.proj-title').value.trim();
                const desc = row.querySelector('.proj-desc').value.trim();
                const tech = row.querySelector('.proj-tech').value.trim();
                const demo = row.querySelector('.proj-demo').value.trim();
                const source = row.querySelector('.proj-source').value.trim();
                const icon = row.querySelector('.proj-icon').value.trim();
                if (title) {
                    projects.push({ title, desc, tech, demo, source, icon });
                }
            });
            return {
                fullName: document.getElementById('fullName').value.trim(),
                titleLine: document.getElementById('titleLine').value.trim(),
                aboutP1: document.getElementById('aboutP1').value.trim(),
                aboutP2: document.getElementById('aboutP2').value.trim(),
                email: document.getElementById('email').value.trim(),
                linkedin: document.getElementById('linkedin').value.trim(),
                github: document.getElementById('github').value.trim(),
                twitter: document.getElementById('twitter').value.trim(),
                skills,
                projects
            };
        }

        // Populate form with data
        function populateForm(data) {
            document.getElementById('fullName').value = data.fullName || '';
            document.getElementById('titleLine').value = data.titleLine || '';
            document.getElementById('aboutP1').value = data.aboutP1 || '';
            document.getElementById('aboutP2').value = data.aboutP2 || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('linkedin').value = data.linkedin || '';
            document.getElementById('github').value = data.github || '';
            document.getElementById('twitter').value = data.twitter || '';

            // Skills
            const skillsContainer = document.getElementById('skillsContainer');
            skillsContainer.innerHTML = '';
            (data.skills || []).forEach(skill => addSkillInput(skill));

            // Projects
            const projectsContainer = document.getElementById('projectsContainer');
            projectsContainer.innerHTML = '';
            (data.projects || []).forEach(proj => addProjectRow(proj));
        }

        // Add skill input row
        function addSkillInput(value = '') {
            const container = document.getElementById('skillsContainer');
            const row = document.createElement('div');
            row.className = 'skill-tag-row';
            row.innerHTML = `
                <input type="text" class="skill-value" value="${value}" placeholder="Skill (e.g., React)">
                <button class="btn-danger btn-sm" onclick="this.closest('.skill-tag-row').remove()"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        function addSkill() { addSkillInput(); }

        // Add project row
        function addProjectRow(proj = {}) {
            const container = document.getElementById('projectsContainer');
            const row = document.createElement('div');
            row.className = 'project-card-row';
            row.style.display = 'grid';
            row.style.gridTemplateColumns = '1fr 1fr';
            row.style.gap = '0.8rem';
            row.style.background = 'rgba(0,0,0,0.2)';
            row.style.padding = '1rem';
            row.style.borderRadius = '12px';
            row.style.marginBottom = '0.5rem';
            row.innerHTML = `
                <div><label>Title</label><input class="proj-title" value="${proj.title || ''}" placeholder="Project name"></div>
                <div><label>Icon (Font Awesome class)</label><input class="proj-icon" value="${proj.icon || 'fa-folder'}" placeholder="fa-store"></div>
                <div style="grid-column: span 2;"><label>Description</label><input class="proj-desc" value="${proj.desc || ''}" placeholder="Short description"></div>
                <div><label>Tech (comma separated)</label><input class="proj-tech" value="${proj.tech || ''}" placeholder="React, Node.js"></div>
                <div><label>Live Demo URL</label><input class="proj-demo" value="${proj.demo || ''}" placeholder="#"></div>
                <div><label>Source Code URL</label><input class="proj-source" value="${proj.source || ''}" placeholder="GitHub link"></div>
                <div style="grid-column: span 2; display: flex; justify-content: flex-end;">
                    <button class="btn-danger btn-sm" onclick="this.closest('.project-card-row').remove()"><i class="fa-solid fa-trash"></i> Remove</button>
                </div>
            `;
            container.appendChild(row);
        }

        function addProject() { addProjectRow(); }

        // Reset to defaults
        function resetToDefaults() {
            if (confirm('Reset all fields to the original defaults? This cannot be undone.')) {
                localStorage.removeItem('portfolioData');
                populateForm(defaultData);
            }
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            populateForm(loadData());
        });
    </script>
</body>
</html>
